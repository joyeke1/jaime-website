<section class="game-layout">

    <h2>Welcome to My Game Experiment</h2> 
    <p>Create your own political figure!</p> 
  </div>

  <!-- ============================ 
   GAME UI (Hidden until setup) 
   ============================ --> 
  <div id="game-ui"> <!--</div> style="display:none;"> -->
    <div class="game-container"> 
      <div id="controls"> 
        <div class="control-group">
          <h3>Choose Skin Tone</h3>
          <div class="skin-swatch-row">
            <button id="skin-light" onclick="selectFeature('skin','light')">
              <span class="swatch" style="background:#f2d6c9;"></span>
            </button>

            <button id="skin-medium" onclick="selectFeature('skin','medium')">
              <span class="swatch" style="background:#d1a38a;"></span>
            </button>

            <button id="skin-tan" onclick="selectFeature('skin','tan')">
              <span class="swatch" style="background:#b07a5a;"></span>
            </button>

            <button id="skin-brown" onclick="selectFeature('skin','brown')">
              <span class="swatch" style="background:#8a5638;"></span>
            </button>

            <button id="skin-dark" onclick="selectFeature('skin','dark')">
              <span class="swatch" style="background:#5a3824;"></span>
            </button>
          </div>
        </div>
        <div class="control-group"> 
          <h3>Choose Hair</h3> 
          <div class="button-column">

          <button id="hair1" onclick="selectFeature('hair','hair1')">
            <img src="media/hair1.png" alt="Hair 1">
          </button>

          <button id="hair2" onclick="selectFeature('hair','hair2')">
            <img src="media/hair2.png" alt="Hair 2">
          </button>

          <button id="hair3" onclick="selectFeature('hair','hair3')">
            <img src="media/hair3.png" alt="Hair 3">
          </button>

          <button id="hair4" onclick="selectFeature('hair','hair4')">
            <img src="media/hair4.png" alt="Hair 4">
          </button>

          <button id="hair5" onclick="selectFeature('hair','hair5')">
            <img src="media/hair5.png" alt="Hair 5">
          </button>

        </div>


        </div> 
        <div class="control-group"> 
          <h3>Choose Eyes</h3> 
          <div class="button-column">
            <button id="eyes-blue" onclick="selectFeature('eyes','blue')">
              <img src="media/eyes-blue.png" alt="Blue Eyes">
            </button>

            <button id="eyes-brown" onclick="selectFeature('eyes','brown')">
              <img src="media/eyes-brown.png" alt="Brown Eyes">
            </button>

            <button id="eyes-green" onclick="selectFeature('eyes','green')">
              <img src="media/eyes-green.png" alt="Green Eyes">
            </button>

            <button id="eyes-black" onclick="selectFeature('eyes','black')">
              <img src="media/eyes-black.png" alt="Black Eyes">
            </button>
          </div>
 
        </div> 
        <div class="control-group"> 
          <h3>Choose Nose</h3> 
          <div class="button-column">
            <button id="nose-nose1" onclick="selectFeature('nose','nose1')">
              <img src="media/nose1.png" alt="Nose 1">
            </button>

            <button id="nose-nose2" onclick="selectFeature('nose','nose2')">
              <img src="media/nose2.png" alt="Nose 2">
            </button>

            <button id="nose-nose3" onclick="selectFeature('nose','nose3')">
              <img src="media/nose3.png" alt="Nose 3">
            </button>

            <button id="nose-nose4" onclick="selectFeature('nose','nose4')">
              <img src="media/nose4.png" alt="Nose 4">
            </button>
            <button id="nose-nose5" onclick="selectFeature('nose','nose5')">
              <img src="media/nose5.png" alt="Nose 5">
            </button>
          </div>
        


        </div> 
      </div> 
      <div id="character-stage" class="skin-light"> 
        <img id="layer-skin" class="character-layer skin-layer">
        <img id="layer-eyes" class="character-layer eyes-layer">
        <img id="layer-hair" class="character-layer hair-layer">
        <img id="layer-nose" class="character-layer nose-layer">

      </div> 
    </div> 
  </div> 
</section>
